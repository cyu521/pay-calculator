<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay Calculator</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent-hover: #7dd3fc;
      --green: #4ade80;
      --green-hover: #86efac;
      --red: #f87171;
      --red-hover: #fca5a5;
      --orange: #fb923c;
      --orange-hover: #fdba74;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* --- Login Screen --- */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
    }

    .login-screen h1 { font-size: 2.5rem; color: var(--accent); }
    .login-screen p { color: var(--text-muted); font-size: 1.1rem; }

    .btn-google {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      color: #333;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .btn-google:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .btn-google img {
      width: 20px;
      height: 20px;
    }

    /* --- Top Bar --- */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .top-bar .brand { font-size: 1.2rem; font-weight: 700; color: var(--accent); }

    .user-info { display: flex; align-items: center; gap: 0.75rem; }

    .user-info img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--accent);
    }

    .user-info .user-name { font-size: 0.9rem; color: var(--text); }

    .btn-signout {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-signout:hover { background: var(--surface2); color: var(--text); }

    /* --- Main Content --- */
    .container { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem; }
    .hidden { display: none !important; }

    /* --- Loading --- */
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* --- Cards & Forms --- */
    .form-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
    }

    .form-card h2 { margin-bottom: 1rem; font-size: 1.1rem; color: var(--text-muted); }

    .form-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      flex: 1;
      min-width: 120px;
    }

    .form-group label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: var(--accent); }

    .btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-green { background: var(--green); color: var(--bg); }
    .btn-green:hover { background: var(--green-hover); }
    .btn-red { background: var(--red); color: var(--bg); }
    .btn-red:hover { background: var(--red-hover); }
    .btn-orange { background: var(--orange); color: var(--bg); }
    .btn-orange:hover { background: var(--orange-hover); }
    .btn-small { padding: 0.35rem 0.7rem; font-size: 0.8rem; }

    /* --- Tables --- */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .section-header h2 { font-size: 1.1rem; color: var(--text-muted); }

    table { width: 100%; border-collapse: collapse; }

    th {
      text-align: left;
      padding: 0.6rem 0.5rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.6rem 0.5rem;
      border-bottom: 1px solid var(--surface2);
      font-size: 0.95rem;
    }

    tr:last-child td { border-bottom: none; }

    .totals-row td {
      font-weight: 700;
      border-bottom: 2px solid var(--accent);
      border-top: none;
      color: var(--accent);
      padding-bottom: 0.8rem;
    }

    /* Highlight My Pay and Total columns */
    .col-mypay { color: var(--accent); font-weight: 600; }
    .col-total { color: var(--green); font-weight: 600; }
    th.col-mypay { color: var(--accent); }
    th.col-total { color: var(--green); }
    .totals-row .col-mypay { color: var(--accent); }
    .totals-row .col-total { color: var(--green); }

    .actions-cell { display: flex; gap: 0.4rem; }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .stash-detail {
      margin-top: 0.75rem;
      padding: 1rem;
      background: var(--surface2);
      border-radius: 8px;
    }

    /* --- Edit modal --- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 90%;
      max-width: 400px;
    }

    .modal h3 { margin-bottom: 1rem; color: var(--accent); }
    .modal .form-group { margin-bottom: 0.75rem; }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface2); }

    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      .form-group { min-width: 100%; }
      .form-group input { font-size: 16px; } /* prevents iOS zoom on focus */

      .top-bar { flex-direction: column; gap: 0.5rem; padding: 0.5rem 1rem; }
      .top-bar .brand { font-size: 1rem; }
      .user-info { width: 100%; justify-content: space-between; }

      .container { padding: 1rem 0.5rem; }
      .form-card { padding: 1rem; }

      /* Card layout for entries on mobile */
      .entry-cards { display: flex; flex-direction: column; gap: 0.75rem; }

      .entry-card {
        background: var(--surface2);
        border-radius: 8px;
        padding: 0.75rem;
      }

      .entry-card-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.35rem;
      }

      .entry-card-row:last-child { margin-bottom: 0; }

      .entry-card-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
      }

      .entry-card-value {
        font-size: 0.95rem;
        font-weight: 500;
      }

      .entry-card-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
        padding-top: 0.5rem;
        border-top: 1px solid var(--border);
      }

      .entry-card-actions .btn { flex: 1; text-align: center; }

      .mobile-totals {
        background: var(--surface2);
        border-radius: 8px;
        padding: 0.75rem;
        border: 2px solid var(--accent);
      }

      .mobile-totals .entry-card-value { color: var(--accent); font-weight: 700; }
      .mobile-totals .entry-card-label { color: var(--accent); }

      /* Hide desktop table on mobile */
      .desktop-table { display: none; }

      .stash-detail { padding: 0.75rem; }

      .stash-summary {
        flex-direction: column !important;
        gap: 0.5rem !important;
        align-items: flex-start !important;
      }

      .stash-summary span:last-child {
        display: flex;
        gap: 0.5rem;
        width: 100%;
      }

      .stash-summary span:last-child .btn { flex: 1; text-align: center; }

      .section-header { flex-wrap: wrap; gap: 0.5rem; }
    }

    /* Show desktop table on larger screens, hide mobile cards */
    @media (min-width: 601px) {
      .mobile-entries { display: none; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <h1>💰 Pay Calculator</h1>
  <p>Sign in to track your pay</p>
  <button class="btn-google" id="googleSignInBtn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Sign in with Google
  </button>
</div>

<!-- App Screen -->
<div id="appScreen" class="hidden">
  <div class="top-bar">
    <span class="brand">💰 Pay Calculator</span>
    <div class="user-info">
      <img id="userAvatar" src="" alt="avatar">
      <span id="userName" class="user-name"></span>
      <button class="btn-signout" id="signOutBtn">Sign Out</button>
    </div>
  </div>

  <div class="container">
    <div class="form-card">
      <h2>New Entry</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="entryDate">
        </div>
        <div class="form-group">
          <label>Service Cost ($)</label>
          <input type="number" id="serviceCost" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Tip ($)</label>
          <input type="number" id="tip" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group" style="max-width:100px;">
          <label>My Pay %</label>
          <input type="number" id="payPercent" min="0" max="100" step="1" value="60">
        </div>
        <button class="btn btn-primary" id="submitBtn">Submit</button>
      </div>
    </div>

    <div class="form-card">
      <div class="section-header">
        <h2>Current Entries</h2>
        <button class="btn btn-green btn-small" id="stashBtn">📦 Stash</button>
      </div>
      <div id="currentEntries"><div class="loading">Loading...</div></div>
    </div>

    <div class="form-card">
      <h2>Stashed History</h2>
      <div id="stashedHistory"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Edit Entry</h3>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="editDate">
    </div>
    <div class="form-group">
      <label>Service Cost ($)</label>
      <input type="number" id="editServiceCost" min="0" step="0.01">
    </div>
    <div class="form-group">
      <label>Tip ($)</label>
      <input type="number" id="editTip" min="0" step="0.01">
    </div>
    <div class="form-group">
      <label>My Pay %</label>
      <input type="number" id="editPayPercent" min="0" max="100" step="1">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="editCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="editSaveBtn">Save</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAf1ceWVzpAOXSLlwoPKliiooinqCzny2U",
    authDomain: "pay-calculator-f3314.firebaseapp.com",
    projectId: "pay-calculator-f3314",
    storageBucket: "pay-calculator-f3314.firebasestorage.app",
    messagingSenderId: "765596328327",
    appId: "1:765596328327:web:38ba65b107a9b206e63322"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // ============================================================
  // State
  // ============================================================
  let currentUser = null;
  let state = { entries: [], stashes: [] };

  function userDocRef() {
    return doc(db, 'users', currentUser.uid);
  }

  async function loadState() {
    const snap = await getDoc(userDocRef());
    if (snap.exists()) {
      state = snap.data();
      if (!state.entries) state.entries = [];
      if (!state.stashes) state.stashes = [];
    } else {
      state = { entries: [], stashes: [] };
    }
  }

  async function saveState() {
    await setDoc(userDocRef(), state);
  }

  // ============================================================
  // Auth
  // ============================================================
  document.getElementById('googleSignInBtn').addEventListener('click', () => {
    signInWithRedirect(auth, provider);
  });

  document.getElementById('signOutBtn').addEventListener('click', () => {
    signOut(auth);
  });

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('appScreen').classList.remove('hidden');
      document.getElementById('userAvatar').src = user.photoURL || '';
      document.getElementById('userName').textContent = user.displayName || user.email;
      document.getElementById('entryDate').value = todayStr();

      await loadState();
      render();
    } else {
      currentUser = null;
      document.getElementById('appScreen').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
    }
  });

  // ============================================================
  // Helpers
  // ============================================================
  function fmt(n) { return n.toFixed(2); }

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function formatDate(iso) {
    const [y, m, d] = iso.split('-');
    return `${m}/${d}/${y}`;
  }

  function dateRangeLabel(entries) {
    const dates = entries.map(e => e.date).sort();
    const earliest = dates[0];
    const latest = dates[dates.length - 1];
    if (earliest === latest) return formatDate(earliest);
    return `${formatDate(earliest)} – ${formatDate(latest)}`;
  }

  // ============================================================
  // Add Entry
  // ============================================================
  async function addEntry() {
    const date = document.getElementById('entryDate').value;
    const serviceCost = parseFloat(document.getElementById('serviceCost').value) || 0;
    const tip = parseFloat(document.getElementById('tip').value) || 0;
    const payPercent = parseFloat(document.getElementById('payPercent').value) || 60;

    if (serviceCost <= 0) {
      alert('Please enter a service cost.');
      return;
    }

    const myPay = serviceCost * (payPercent / 100);
    const total = myPay + tip;

    state.entries.push({ id: Date.now(), date, serviceCost, tip, payPercent, myPay, total });
    await saveState();

    document.getElementById('serviceCost').value = '';
    document.getElementById('tip').value = '';
    document.getElementById('entryDate').value = todayStr();
    render();
  }

  document.getElementById('submitBtn').addEventListener('click', addEntry);
  document.getElementById('serviceCost').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });
  document.getElementById('tip').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });

  // ============================================================
  // Delete Entry
  // ============================================================
  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    state.entries = state.entries.filter(e => e.id !== id);
    await saveState();
    render();
  }

  // ============================================================
  // Edit Entry
  // ============================================================
  let editingId = null;
  let editingSource = null;

  function openEditModal(id, source) {
    editingId = id;
    editingSource = source;

    const entry = source === 'current'
      ? state.entries.find(e => e.id === id)
      : state.stashes[source].entries.find(e => e.id === id);

    document.getElementById('editDate').value = entry.date;
    document.getElementById('editServiceCost').value = entry.serviceCost;
    document.getElementById('editTip').value = entry.tip;
    document.getElementById('editPayPercent').value = entry.payPercent || 60;
    document.getElementById('editModal').classList.add('active');
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
    editingId = null;
    editingSource = null;
  }

  async function saveEdit() {
    const date = document.getElementById('editDate').value;
    const serviceCost = parseFloat(document.getElementById('editServiceCost').value) || 0;
    const tip = parseFloat(document.getElementById('editTip').value) || 0;
    const payPercent = parseFloat(document.getElementById('editPayPercent').value) || 60;
    const myPay = serviceCost * (payPercent / 100);
    const total = myPay + tip;

    const entries = editingSource === 'current'
      ? state.entries
      : state.stashes[editingSource].entries;

    const idx = entries.findIndex(e => e.id === editingId);
    if (idx !== -1) {
      entries[idx] = { ...entries[idx], date, serviceCost, tip, payPercent, myPay, total };
    }

    await saveState();
    closeEditModal();
    render();
  }

  document.getElementById('editCancelBtn').addEventListener('click', closeEditModal);
  document.getElementById('editSaveBtn').addEventListener('click', saveEdit);

  // ============================================================
  // Stash / Unstash / Delete Stash
  // ============================================================
  async function stashEntries() {
    if (state.entries.length === 0) {
      alert('No entries to stash.');
      return;
    }

    const label = dateRangeLabel(state.entries);

    state.stashes.unshift({
      id: Date.now(),
      label,
      stashedAt: new Date().toISOString(),
      entries: [...state.entries]
    });
    state.entries = [];
    await saveState();
    render();
  }

  async function unstash(stashId) {
    const idx = state.stashes.findIndex(s => s.id === stashId);
    if (idx === -1) return;

    state.entries = [...state.entries, ...state.stashes[idx].entries];
    state.stashes.splice(idx, 1);
    await saveState();
    render();
  }

  async function deleteStash(stashId) {
    if (!confirm('Permanently delete this stash?')) return;
    state.stashes = state.stashes.filter(s => s.id !== stashId);
    await saveState();
    render();
  }

  document.getElementById('stashBtn').addEventListener('click', stashEntries);

  // ============================================================
  // Render
  // ============================================================
  function renderTable(entries, source) {
    if (entries.length === 0) {
      return '<div class="empty-state">No entries yet</div>';
    }

    const sumService = entries.reduce((s, e) => s + e.serviceCost, 0);
    const sumTip = entries.reduce((s, e) => s + e.tip, 0);
    const sumMyPay = entries.reduce((s, e) => s + e.myPay, 0);
    const sumTotal = entries.reduce((s, e) => s + e.total, 0);
    const totalsAtTop = (source === 'current');

    // Desktop table
    let html = `<div class="desktop-table"><table>
      <thead><tr>
        <th>Date</th><th>Service</th><th>Tip</th><th>Pay %</th><th class="col-mypay">My Pay</th><th class="col-total">Total</th><th></th>
      </tr></thead><tbody>`;

    if (totalsAtTop) {
      html += `<tr class="totals-row">
        <td>Totals</td>
        <td>$${fmt(sumService)}</td>
        <td>$${fmt(sumTip)}</td>
        <td></td>
        <td class="col-mypay">$${fmt(sumMyPay)}</td>
        <td class="col-total">$${fmt(sumTotal)}</td>
        <td></td>
      </tr>`;
    }

    for (const e of entries) {
      html += `<tr>
        <td>${formatDate(e.date)}</td>
        <td>$${fmt(e.serviceCost)}</td>
        <td>$${fmt(e.tip)}</td>
        <td>${e.payPercent || 60}%</td>
        <td class="col-mypay">$${fmt(e.myPay)}</td>
        <td class="col-total">$${fmt(e.total)}</td>
        <td><div class="actions-cell">
          <button class="btn btn-primary btn-small" data-edit="${e.id}" data-source="${source}">✏️</button>
          ${source === 'current' ? `<button class="btn btn-red btn-small" data-delete="${e.id}">🗑</button>` : ''}
        </div></td>
      </tr>`;
    }

    if (!totalsAtTop) {
      html += `<tr class="totals-row">
        <td>Totals</td>
        <td>$${fmt(sumService)}</td>
        <td>$${fmt(sumTip)}</td>
        <td></td>
        <td class="col-mypay">$${fmt(sumMyPay)}</td>
        <td class="col-total">$${fmt(sumTotal)}</td>
        <td></td>
      </tr>`;
    }

    html += `</tbody></table></div>`;

    // Mobile cards
    html += `<div class="mobile-entries"><div class="entry-cards">`;

    // Mobile totals at top for current entries
    if (totalsAtTop) {
      html += `<div class="entry-card mobile-totals">
        <div class="entry-card-row">
          <span class="entry-card-label">Total Service</span>
          <span class="entry-card-value">$${fmt(sumService)}</span>
        </div>
        <div class="entry-card-row">
          <span class="entry-card-label">Total Tips</span>
          <span class="entry-card-value">$${fmt(sumTip)}</span>
        </div>
        <div class="entry-card-row">
          <span class="entry-card-label" style="color:var(--accent)">Total My Pay</span>
          <span class="entry-card-value" style="color:var(--accent)">$${fmt(sumMyPay)}</span>
        </div>
        <div class="entry-card-row">
          <span class="entry-card-label" style="color:var(--green)">Grand Total</span>
          <span class="entry-card-value" style="color:var(--green)">$${fmt(sumTotal)}</span>
        </div>
      </div>`;
    }

    for (const e of entries) {
      html += `<div class="entry-card">
        <div class="entry-card-row">
          <span class="entry-card-label">Date</span>
          <span class="entry-card-value">${formatDate(e.date)}</span>
        </div>
        <div class="entry-card-row">
          <span class="entry-card-label">Service</span>
          <span class="entry-card-value">$${fmt(e.serviceCost)}</span>
        </div>
        <div class="entry-card-row">
          <span class="entry-card-label">Tip</span>
          <span class="entry-card-value">$${fmt(e.tip)}</span>
        </div>
        <div class="entry-card-row">
          <span class="entry-card-label">Pay %</span>
          <span class="entry-card-value">${e.payPercent || 60}%</span>
        </div>
        <div class="entry-card-row">
          <span class="entry-card-label" style="color:var(--accent)">My Pay</span>
          <span class="entry-card-value" style="color:var(--accent)">$${fmt(e.myPay)}</span>
        </div>
        <div class="entry-card-row">
          <span class="entry-card-label" style="color:var(--green)">Total</span>
          <span class="entry-card-value" style="color:var(--green)">$${fmt(e.total)}</span>
        </div>
        <div class="entry-card-actions">
          <button class="btn btn-primary btn-small" data-edit="${e.id}" data-source="${source}">✏️ Edit</button>
          ${source === 'current' ? `<button class="btn btn-red btn-small" data-delete="${e.id}">🗑 Delete</button>` : ''}
        </div>
      </div>`;
    }

    // Mobile totals at bottom for stashed
    if (!totalsAtTop) {
      html += `<div class="entry-card mobile-totals">
        <div class="entry-card-row">
          <span class="entry-card-label">Total Service</span>
          <span class="entry-card-value">$${fmt(sumService)}</span>
        </div>
        <div class="entry-card-row">
          <span class="entry-card-label">Total Tips</span>
          <span class="entry-card-value">$${fmt(sumTip)}</span>
        </div>
        <div class="entry-card-row">
          <span class="entry-card-label" style="color:var(--accent)">Total My Pay</span>
          <span class="entry-card-value" style="color:var(--accent)">$${fmt(sumMyPay)}</span>
        </div>
        <div class="entry-card-row">
          <span class="entry-card-label" style="color:var(--green)">Grand Total</span>
          <span class="entry-card-value" style="color:var(--green)">$${fmt(sumTotal)}</span>
        </div>
      </div>`;
    }

    html += `</div></div>`;
    return html;
  }

  function render() {
    // Current entries
    const currentEl = document.getElementById('currentEntries');
    currentEl.innerHTML = renderTable(state.entries, 'current');

    // Stashed history
    const stashEl = document.getElementById('stashedHistory');
    if (state.stashes.length === 0) {
      stashEl.innerHTML = '<div class="empty-state">No stashed history</div>';
    } else {
      let html = '';
      for (let i = 0; i < state.stashes.length; i++) {
        const stash = state.stashes[i];
        const sumTotal = stash.entries.reduce((s, e) => s + e.total, 0);

        html += `<details class="stash-detail" ${i === 0 ? 'open' : ''}>
          <summary class="stash-summary" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
            <span><strong>${stash.label}</strong> — $${fmt(sumTotal)} total</span>
            <span>
              <button class="btn btn-orange btn-small" data-unstash="${stash.id}">↩️ Unstash</button>
              <button class="btn btn-red btn-small" data-delstash="${stash.id}">🗑</button>
            </span>
          </summary>
          ${renderTable(stash.entries, i)}
        </details>`;
      }
      stashEl.innerHTML = html;
    }

    // Attach event listeners via delegation
    document.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = Number(btn.dataset.edit);
        const source = btn.dataset.source === 'current' ? 'current' : Number(btn.dataset.source);
        openEditModal(id, source);
      });
    });

    document.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteEntry(Number(btn.dataset.delete));
      });
    });

    document.querySelectorAll('[data-unstash]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        unstash(Number(btn.dataset.unstash));
      });
    });

    document.querySelectorAll('[data-delstash]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteStash(Number(btn.dataset.delstash));
      });
    });
  }
</script>

</body>
</html>
